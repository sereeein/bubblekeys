<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BubbleKeys</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* Phase 2 hello-world placeholder. Phase 4 replaces this with the Game Boy frame. */
      html, body {
        margin: 0; padding: 0;
        height: 100vh; width: 100vw;
        font-family: -apple-system, "SF Mono", monospace;
        background: linear-gradient(180deg, #b5c8f5 0%, #d4b5f5 60%, #f5b5d4 100%);
        color: #2d2d5f;
        border: 4px solid #2d2d5f;
        box-sizing: border-box;
        border-radius: 8px;
        -webkit-app-region: drag;
      }
      #app {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 16px;
        padding: 20px;
      }
      h1 { margin: 0; font-size: 28px; letter-spacing: 2px; text-shadow: 3px 3px 0 #f5b5d4; }
      p  { margin: 0; font-size: 11px; line-height: 1.6; opacity: 0.75; max-width: 240px; }
      kbd {
        background: #2d2d5f; color: #fff;
        padding: 2px 6px; font-size: 10px; border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
