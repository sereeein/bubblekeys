name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # needed by softprops/action-gh-release to create the release

jobs:
  build:
    name: Build universal .dmg
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable, universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      # Apple signing/notarization env vars deliberately omitted until
      # APPLE_CERTIFICATE (etc.) secrets are configured. GitHub Actions
      # renders missing secrets as empty strings (not unset), and Tauri 2
      # interprets `APPLE_CERTIFICATE=""` as "try to sign" rather than
      # "skip signing", causing `security import` to fail on the empty
      # blob. Re-add the env block once real secrets exist.
      #
      # Bundle target = `app` only (no `dmg`). bundle_dmg.sh requires
      # osascript/Finder GUI operations that fail on headless GitHub
      # runners; we ship the .app inside a .zip instead, which is
      # standard for unsigned OSS macOS apps and works with Homebrew Cask.
      - name: Build universal .app (unsigned)
        run: npm run tauri -- build --target universal-apple-darwin --bundles app

      - name: Pack .app into a universal .zip
        working-directory: src-tauri/target/universal-apple-darwin/release/bundle/macos
        run: |
          ditto -c -k --sequesterRsrc --keepParent BubbleKeys.app BubbleKeys_${{ github.ref_name }}_universal.zip
          shasum -a 256 BubbleKeys_${{ github.ref_name }}_universal.zip > SHA256SUMS

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/BubbleKeys_*_universal.zip
            src-tauri/target/universal-apple-darwin/release/bundle/macos/SHA256SUMS
          draft: true
          generate_release_notes: true
