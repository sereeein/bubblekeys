name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # needed by softprops/action-gh-release to create the release

jobs:
  build:
    name: Build universal .dmg
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable, universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      # Apple signing/notarization env vars deliberately omitted until
      # APPLE_CERTIFICATE (etc.) secrets are configured. GitHub Actions
      # renders missing secrets as empty strings (not unset), and Tauri 2
      # interprets `APPLE_CERTIFICATE=""` as "try to sign" rather than
      # "skip signing", causing `security import` to fail on the empty
      # blob. Re-add the env block once real secrets exist.
      - name: Build universal .dmg (unsigned, verbose)
        run: |
          set -o pipefail
          npm run tauri -- build --target universal-apple-darwin --verbose 2>&1 | tee /tmp/tauri-build.log

      - name: Diagnose bundle_dmg.sh failure
        if: failure()
        run: |
          set +e
          echo "::group::bundle_dmg.sh location"
          SCRIPT=$(find src-tauri/target -name "bundle_dmg.sh" 2>/dev/null | head -1)
          echo "found at: ${SCRIPT:-(not found)}"
          echo "::endgroup::"
          if [ -n "$SCRIPT" ]; then
            echo "::group::bundle_dmg.sh contents"
            cat "$SCRIPT"
            echo "::endgroup::"
            echo "::group::bundle directory listing"
            ls -la "$(dirname "$SCRIPT")"
            echo "::endgroup::"
            echo "::group::Re-run bundle_dmg.sh with bash -x"
            cd "$(dirname "$SCRIPT")"
            bash -x "$SCRIPT" 2>&1 | tail -100
            echo "::endgroup::"
          fi
          echo "::group::tail of tauri build log"
          tail -150 /tmp/tauri-build.log 2>/dev/null || echo "no log captured"
          echo "::endgroup::"

      - name: Compute SHA256 sums
        working-directory: src-tauri/target/universal-apple-darwin/release/bundle/dmg
        run: shasum -a 256 *.dmg > SHA256SUMS

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/SHA256SUMS
          draft: true
          generate_release_notes: true
