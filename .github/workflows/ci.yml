name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Build & test (macOS arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust 1.79
        uses: dtolnay/rust-toolchain@1.79.0

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Verify i18n key completeness
        run: npm run verify:i18n

      - name: Frontend type-check & build
        run: npm run build

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all

      - name: Tauri sanity build (no bundle)
        run: npm run tauri -- build --debug --no-bundle
